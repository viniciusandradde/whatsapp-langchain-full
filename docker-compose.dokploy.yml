# Compose dedicado pro Dokploy.
# Diferenças do docker-compose.yml local:
# - sem `ports:` (Traefik roteia)
# - DATABASE_URL e BETTER_AUTH_URL vêm das envs do painel
# - POSTGRES_PASSWORD obrigatório (sem default)
# - `name: chat-nexus` pra containers virem com prefixo chat-nexus-* em vez
#   do auto-gerado pelo Dokploy (projetos-chatvsanexus-er02mp-*).

name: chat-nexus

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: whatsapp_langchain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/whatsapp_langchain
      LOG_JSON: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      - db
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/whatsapp_langchain
      LOG_JSON: "true"
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file: .env
    environment:
      INTERNAL_API_URL: http://api:8000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/whatsapp_langchain
      PORT: "3000"
    depends_on:
      - api
    restart: unless-stopped

  # Test Runner E2E (Sprint L) — container dedicado pra rodar bateria.
  # Não está atrás de profile aqui em prod — sobe junto com o stack pra
  # admin conseguir disparar via UI em https://chat.vsanexus.com/relatorios/allure.
  # Imagem da API permanece leve (Java/allure só vivem nessa imagem).
  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/whatsapp_langchain
      LOG_JSON: "true"
      # API_BASE_URL: usado pelo conftest pra detectar API saudável + helpers
      # postam webhook. Dentro da rede Docker, api:8000 (não localhost:8081).
      API_BASE_URL: http://api:8000
      WEBHOOK_BASE_URL: http://api:8000
      # Workers baixam mídia do http server criado no container `tests`. Como
      # o tests roda na mesma rede Docker, hostname é `tests` (não localhost).
      MEDIA_SERVER_HOST: tests
      TEST_RUNNER_REPO_ROOT: /app
    expose:
      - "8001"
    volumes:
      - tests_reports:/app/tests/reports
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M

volumes:
  postgres_data:
  tests_reports:
